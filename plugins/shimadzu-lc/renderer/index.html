<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shimadzu LC Renderer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
        --vscode-bg: #f3f3f3;
        --vscode-panel: #ffffff;
        --vscode-sidebar: #f8f8f8;
        --vscode-toolbar: #f3f3f3;
        --vscode-border: #e5e5e5;
        --vscode-border-strong: #c8c8c8;
        --vscode-text: #1f1f1f;
        --vscode-muted: #616161;
        --vscode-subtle: #8a8a8a;
        --vscode-accent: #0078d4;
        --vscode-accent-soft: #eff6fc;
        --vscode-danger: #a1260d;
        --vscode-danger-bg: #f6eceb;
        --vscode-input: #ffffff;
        background: var(--vscode-bg);
        color: var(--vscode-text);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--vscode-bg);
      }

      body {
        padding: 12px;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        background: rgba(0, 120, 212, 0.05);
      }

      input:focus-visible,
      button:focus-visible {
        outline: 1px solid var(--vscode-accent);
        outline-offset: -1px;
      }

      .card {
        display: grid;
        gap: 0;
        min-height: 100%;
        border: 1px solid var(--vscode-border);
        border-radius: 0;
        background: var(--vscode-panel);
        box-shadow: none;
      }

      .card code {
        padding: 1px 4px;
        border: 1px solid var(--vscode-border);
        border-radius: 2px;
        background: #f8f8f8;
        font-family: Consolas, "Courier New", monospace;
        font-size: 11px;
      }

      .empty {
        display: grid;
        min-height: 180px;
        place-items: center;
        color: var(--vscode-muted);
        font-size: 13px;
      }

      .heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-sidebar);
      }

      .eyebrow,
      .field-label,
      .table th {
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .eyebrow {
        display: block;
        margin-bottom: 4px;
        color: var(--vscode-subtle);
        font-size: 11px;
        font-weight: 600;
      }

      .title {
        margin: 0;
        color: var(--vscode-text);
        font-size: 18px;
        font-weight: 600;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--vscode-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .pills {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }

      .pill,
      .sync {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        border: 1px solid var(--vscode-border);
        border-radius: 2px;
        background: var(--vscode-panel);
        color: var(--vscode-muted);
        font-size: 11px;
        font-weight: 500;
      }

      .sync::before {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--vscode-accent);
        content: "";
      }

      .workspace {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        gap: 0;
        min-height: 360px;
      }

      .sidebar {
        display: grid;
        gap: 0;
        align-content: start;
        border-right: 1px solid var(--vscode-border);
        background: var(--vscode-sidebar);
      }

      .field-card,
      .metric {
        padding: 12px 14px;
        border: 0;
        border-bottom: 1px solid var(--vscode-border);
        border-radius: 0;
        background: transparent;
      }

      .field-label {
        display: block;
        margin-bottom: 6px;
        color: var(--vscode-subtle);
        font-size: 10px;
        font-weight: 600;
      }

      .field-input,
      .axis-field input,
      .table input {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid var(--vscode-border-strong);
        border-radius: 2px;
        background: var(--vscode-input);
        color: var(--vscode-text);
        font-size: 12px;
        box-shadow: none;
      }

      .field-suffix {
        margin-top: 6px;
        color: var(--vscode-muted);
        font-size: 11px;
        line-height: 1.5;
      }

      .metrics {
        display: grid;
        gap: 0;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        color: var(--vscode-text);
        font-size: 18px;
        font-weight: 600;
      }

      .chart-panel {
        display: grid;
        gap: 0;
        background: var(--vscode-panel);
      }

      .chart-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
      }

      .mode-switch {
        display: inline-flex;
        gap: 0;
        border: 1px solid var(--vscode-border);
        border-radius: 0;
        background: var(--vscode-panel);
      }

      .mode-button {
        padding: 7px 12px;
        border: 0;
        border-right: 1px solid var(--vscode-border);
        border-radius: 0;
        background: transparent;
        color: var(--vscode-muted);
        font-size: 12px;
        font-weight: 500;
      }

      .mode-button:last-child {
        border-right: 0;
      }

      .mode-button.is-active {
        background: var(--vscode-accent-soft);
        color: var(--vscode-text);
        box-shadow: inset 0 -2px 0 var(--vscode-accent);
      }

      .panel-shell {
        display: grid;
        grid-template-columns: 144px minmax(0, 1fr);
        gap: 0;
        overflow: hidden;
        background: var(--vscode-panel);
      }

      .panel-sidebar {
        padding: 14px;
        border-right: 1px solid var(--vscode-border);
        background: var(--vscode-sidebar);
      }

      .panel-title {
        color: var(--vscode-text);
        font-size: 12px;
        font-weight: 600;
      }

      .panel-helper {
        margin-top: 8px;
        color: var(--vscode-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .radio-line {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        color: var(--vscode-muted);
        font-size: 11px;
      }

      .radio-line span::before {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 12px;
        height: 12px;
        margin-right: 5px;
        border: 1px solid var(--vscode-border-strong);
        border-radius: 999px;
        background: var(--vscode-panel);
        color: var(--vscode-accent);
        font-size: 9px;
        content: "";
      }

      .radio-line span.is-active::before {
        content: "●";
      }

      .axis-field {
        display: grid;
        gap: 4px;
        margin-top: 14px;
      }

      .axis-caption {
        color: var(--vscode-subtle);
        font-size: 10px;
        font-weight: 600;
      }

      .graph-area {
        position: relative;
        min-height: 264px;
        padding: 18px 18px 48px;
        background: #fbfbfb;
      }

      .graph-grid {
        position: absolute;
        inset: 18px 18px 48px;
        border: 1px solid var(--vscode-border);
        background-image:
          linear-gradient(to right, rgba(127, 127, 127, 0.12) 1px, transparent 1px),
          linear-gradient(to top, rgba(127, 127, 127, 0.1) 1px, transparent 1px);
        background-size: 18% 100%, 100% 24%;
      }

      .graph-template {
        position: absolute;
        inset: 26px 28px 58px 36px;
        width: calc(100% - 64px);
        height: calc(100% - 84px);
        object-fit: contain;
        opacity: 0.22;
        filter: saturate(0.85);
        pointer-events: none;
      }

      .graph-overlay,
      .graph-line {
        position: absolute;
        inset: 18px 18px 48px;
        width: calc(100% - 36px);
        height: calc(100% - 66px);
      }

      .graph-line {
        overflow: visible;
      }

      .graph-line polyline {
        fill: none;
        stroke: #d13438;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 3;
        filter: none;
      }

      .graph-axis-top,
      .graph-axis-bottom {
        position: absolute;
        left: 22px;
        right: 22px;
        display: flex;
        justify-content: space-between;
        color: var(--vscode-subtle);
        font-size: 10px;
        font-weight: 600;
      }

      .graph-axis-top {
        top: 8px;
      }

      .graph-axis-bottom {
        bottom: 18px;
      }

      .segment-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
      }

      .segment {
        padding: 10px 12px;
        border-right: 1px solid var(--vscode-border);
        background: transparent;
      }

      .segment:last-child {
        border-right: 0;
      }

      .segment strong {
        display: block;
        margin-top: 3px;
        color: var(--vscode-text);
        font-size: 14px;
        font-weight: 600;
      }

      .simple-shell {
        display: grid;
        gap: 0;
      }

      .simple-frame {
        display: grid;
        gap: 12px;
        padding: 14px;
        background: var(--vscode-panel);
      }

      .simple-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .simple-header p {
        margin: 6px 0 0;
        color: var(--vscode-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .simple-figure {
        display: grid;
        place-items: center;
        min-height: 250px;
        margin: 0;
        padding: 18px;
        border: 1px solid var(--vscode-border);
        border-radius: 0;
        background: #fafafa;
      }

      .simple-image {
        display: block;
        width: min(100%, 640px);
        height: auto;
        border: 1px solid var(--vscode-border-strong);
        border-radius: 0;
        box-shadow: none;
        background: #ffffff;
      }

      .simple-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        border-top: 1px solid var(--vscode-border);
        border-left: 1px solid var(--vscode-border);
      }

      .simple-chip {
        flex: 1 1 120px;
        padding: 9px 10px;
        border-right: 1px solid var(--vscode-border);
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-panel);
        color: var(--vscode-muted);
        font-size: 11px;
        font-weight: 500;
      }

      .mode-note {
        padding: 10px 14px;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-accent-soft);
        color: var(--vscode-muted);
        font-size: 11px;
        font-weight: 500;
      }

      .editor {
        display: grid;
        gap: 0;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-panel);
      }

      .editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
      }

      .editor-header p {
        margin: 0;
        color: var(--vscode-muted);
        font-size: 12px;
      }

      .editor-actions {
        display: flex;
        gap: 8px;
      }

      .button {
        padding: 7px 12px;
        border: 1px solid var(--vscode-border-strong);
        border-radius: 2px;
        background: var(--vscode-panel);
        color: var(--vscode-text);
        font-size: 12px;
        font-weight: 500;
      }

      .button--accent {
        border-color: var(--vscode-accent);
        background: var(--vscode-accent);
        color: #ffffff;
      }

      .button--accent:hover {
        background: #106ebe;
      }

      .table-shell {
        overflow: hidden;
        background: var(--vscode-panel);
      }

      .table {
        width: 100%;
        border-collapse: collapse;
      }

      .table th,
      .table td {
        padding: 9px 10px;
        border-bottom: 1px solid var(--vscode-border);
        text-align: left;
      }

      .table th {
        color: var(--vscode-muted);
        font-size: 10px;
        font-weight: 600;
        background: var(--vscode-toolbar);
      }

      .table td {
        color: var(--vscode-text);
        font-size: 12px;
        background: var(--vscode-panel);
      }

      .table tr:last-child td {
        border-bottom: 0;
      }

      .table-index {
        width: 56px;
        color: var(--vscode-muted);
        font-weight: 600;
      }

      .table-action {
        width: 72px;
        text-align: right;
      }

      .icon-button {
        padding: 5px 8px;
        border: 1px solid #d9c2bd;
        border-radius: 2px;
        background: var(--vscode-panel);
        color: var(--vscode-danger);
        font-size: 11px;
        font-weight: 500;
      }

      .icon-button:hover {
        background: var(--vscode-danger-bg);
      }

      .footer-note {
        padding: 10px 14px;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
        color: var(--vscode-muted);
        font-size: 11px;
        line-height: 1.5;
      }

      @media (max-width: 860px) {
        body {
          padding: 0;
        }

        .card {
          border-left: 0;
          border-right: 0;
        }

        .heading {
          padding: 12px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--vscode-border);
        }

        .segment-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .panel-shell {
          grid-template-columns: 1fr;
        }

        .panel-sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--vscode-border);
        }

        .chart-toolbar,
        .editor-header {
          flex-direction: column;
          align-items: stretch;
        }

        .pills {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="card" id="root">
      <div class="empty">Shimadzu LC renderer is ready.</div>
    </div>
    <script>
      const root = document.getElementById("root");
      const SET_BLOCK_MESSAGE_TYPE = "integral:set-block";
      const UPDATE_PARAMS_MESSAGE_TYPE = "integral:update-params";
      const DEFAULT_VIEW_MODE = "detail";

      let currentModel = null;
      let currentViewMode = DEFAULT_VIEW_MODE;

      window.addEventListener("message", (event) => {
        if (!event.data || event.data.type !== SET_BLOCK_MESSAGE_TYPE) {
          return;
        }

        currentModel = event.data.payload;
        renderCurrentModel();
      });

      function renderCurrentModel() {
        if (!currentModel) {
          currentViewMode = DEFAULT_VIEW_MODE;
          root.innerHTML = '<div class="empty">Shimadzu LC renderer is ready.</div>';
          return;
        }

        const block = isRecord(currentModel.block) ? currentModel.block : {};
        const params = isRecord(block.params) ? { ...block.params } : {};
        const points = readGradientPoints(params["time-prog"]);
        const analysisTime = readNumber(params["analysis-time"]) ?? inferAnalysisTime(points);
        const viewMode = currentViewMode === "simple" ? "simple" : DEFAULT_VIEW_MODE;
        const segments = buildSegments(points, analysisTime);
        const polyline = buildPolyline(points, analysisTime);
        const startConc = points[0]?.conc ?? null;
        const endConc = points.length > 0 ? Math.max(...points.map((point) => point.conc)) : null;

        root.innerHTML = `
          <div class="heading">
            <div>
              <span class="eyebrow">LC Method Renderer</span>
              <h1 class="title">グラジエント設定</h1>
              <p class="subtitle">
                詳細モードでは編集、シンプルモードでは画像ベースの簡易表示を行います。
              </p>
            </div>
            <div class="pills">
              <span class="sync">Markdown synced</span>
              <span class="pill">${escapeHtml(block.type ?? "unknown")}</span>
              <span class="pill">${escapeHtml(currentModel.plugin?.displayName ?? "Shimadzu LC")}</span>
            </div>
          </div>

          <div class="workspace">
            ${renderSidebarMarkup({ analysisTime, points, viewMode })}

            <div class="chart-panel">
              <div class="chart-toolbar">
                <div>
                  <span class="eyebrow">Preview</span>
                  <div class="panel-title">グラジエント</div>
                </div>
                ${renderModeSwitchMarkup(viewMode, points, analysisTime)}
              </div>

              ${
                viewMode === "detail"
                  ? renderDetailPanelMarkup({
                      endConc,
                      polyline,
                      segments,
                      startConc
                    })
                  : renderSimplePanelMarkup({
                      analysisTime,
                      points,
                      segments
                    })
              }
            </div>
          </div>

          ${
            viewMode === "detail"
              ? renderEditorMarkup(points)
              : `
                <div class="mode-note">
                  シンプルモードは表示専用です。値の編集は詳細モードへ切り替えて行います。
                </div>
              `
          }

          <div class="footer-note">
            Relative asset paths are resolved from <code>renderer/index.html</code>, so this renderer can use
            <code>../gradient.png</code> for simple preview mode.
          </div>
        `;

        bindInteractions(params, points, analysisTime, viewMode);
      }

      function renderSidebarMarkup({ analysisTime, points, viewMode }) {
        return `
          <div class="sidebar">
            ${
              viewMode === "detail"
                ? `
                  <div class="field-card">
                    <label class="field-label" for="analysis-time-input">Analysis Time</label>
                    <input
                      class="field-input"
                      data-role="analysis-time"
                      id="analysis-time-input"
                      min="0"
                      step="0.1"
                      type="number"
                      value="${formatInputValue(analysisTime)}"
                    />
                    <div class="field-suffix">minutes</div>
                  </div>
                `
                : `
                  <div class="field-card">
                    <span class="field-label">Display</span>
                    <strong>Simple Mode</strong>
                    <div class="field-suffix">
                      渡した <code>gradient.png</code> を使った画像ベースの簡易表示です。
                    </div>
                  </div>
                `
            }

            <div class="metrics">
              <div class="metric">
                <span class="field-label">Analysis Time</span>
                <strong>${formatDisplayNumber(analysisTime, "min")}</strong>
              </div>
              <div class="metric">
                <span class="field-label">Points</span>
                <strong>${escapeHtml(String(points.length))}</strong>
              </div>
            </div>
          </div>
        `;
      }

      function renderModeSwitchMarkup(viewMode, points, analysisTime) {
        return `
          <div class="pills">
            <span class="pill">${points.length} points</span>
            <span class="pill">${formatDisplayNumber(analysisTime, "min")}</span>
            <div class="mode-switch">
              <button class="mode-button${viewMode === "detail" ? " is-active" : ""}" data-view-mode="detail" type="button">
                詳細
              </button>
              <button class="mode-button${viewMode === "simple" ? " is-active" : ""}" data-view-mode="simple" type="button">
                シンプル
              </button>
            </div>
          </div>
        `;
      }

      function renderDetailPanelMarkup({ endConc, polyline, segments, startConc }) {
        return `
          <div class="panel-shell">
            <div class="panel-sidebar">
              <div class="panel-title">詳細モード</div>
              <div class="panel-helper">
                time-prog と濃度を編集し、preview と JSON を同期します。
              </div>

              <div class="axis-field">
                <span class="axis-caption">End B.Conc</span>
                <input
                  data-role="end-conc"
                  min="0"
                  step="0.1"
                  type="number"
                  value="${formatInputValue(endConc)}"
                />
              </div>

              <div class="axis-field">
                <span class="axis-caption">Start B.Conc</span>
                <input
                  data-role="start-conc"
                  min="0"
                  step="0.1"
                  type="number"
                  value="${formatInputValue(startConc)}"
                />
              </div>
            </div>

            <div class="graph-area">
              <div class="graph-axis-top">
                <span>${escapeHtml(formatSegmentValue(endConc ?? 95))}</span>
                <span>B.Conc</span>
                <span>${escapeHtml(formatSegmentValue(startConc ?? 0))}</span>
              </div>
              <div class="graph-grid"></div>
              <img alt="" class="graph-template" src="../gradient.png" />
              <svg class="graph-line" preserveAspectRatio="none" viewBox="0 0 100 100">
                <polyline points="${polyline}"></polyline>
              </svg>
              <div class="graph-axis-bottom">
                ${segments
                  .map(
                    (segment) => `<span>${escapeHtml(formatSegmentValue(segment.duration))}</span>`
                  )
                  .join("")}
              </div>
            </div>
          </div>

          <div class="segment-strip">
            ${segments
              .map(
                (segment) => `
                  <div class="segment">
                    <span class="field-label">${escapeHtml(segment.label)}</span>
                    <strong>${escapeHtml(formatSegmentValue(segment.duration))}</strong>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderSimplePanelMarkup({ analysisTime, points, segments }) {
        return `
          <div class="simple-shell">
            <div class="simple-frame">
              <div class="simple-header">
                <div>
                  <span class="eyebrow">Simple Preview</span>
                  <div class="panel-title">シンプルモード</div>
                  <p>渡した画像をそのまま使う簡易表示です。見た目確認に寄せています。</p>
                </div>
              </div>

              <figure class="simple-figure">
                <img alt="Gradient simple preview" class="simple-image" src="../gradient.png" />
              </figure>

              <div class="simple-summary">
                <span class="simple-chip">Analysis ${escapeHtml(formatDisplayNumber(analysisTime, "min"))}</span>
                <span class="simple-chip">Points ${escapeHtml(String(points.length))}</span>
                <span class="simple-chip">Ramp ${escapeHtml(formatSegmentValue(segments[1]?.duration ?? 0))} min</span>
                <span class="simple-chip">Plateau ${escapeHtml(formatSegmentValue(segments[2]?.duration ?? 0))} min</span>
              </div>
            </div>
          </div>
        `;
      }

      function renderEditorMarkup(points) {
        return `
          <div class="editor">
            <div class="editor-header">
              <p>time-prog を編集すると、Preview と Markdown の両方に反映されます。</p>
              <div class="editor-actions">
                <button class="button button--accent" data-action="add-point" type="button">Add Point</button>
              </div>
            </div>

            <div class="table-shell">
              <table class="table">
                <thead>
                  <tr>
                    <th class="table-index">Step</th>
                    <th>Time (min)</th>
                    <th>B.Conc (%)</th>
                    <th class="table-action">Action</th>
                  </tr>
                </thead>
                <tbody>
                  ${
                    points.length === 0
                      ? `
                        <tr>
                          <td class="table-index">-</td>
                          <td colspan="3">time-prog が未設定です。Add Point から初期化できます。</td>
                        </tr>
                      `
                      : points
                          .map(
                            (point, index) => `
                              <tr>
                                <td class="table-index">#${index + 1}</td>
                                <td>
                                  <input
                                    data-point-index="${index}"
                                    data-point-key="time"
                                    min="0"
                                    step="0.1"
                                    type="number"
                                    value="${formatInputValue(point.time)}"
                                  />
                                </td>
                                <td>
                                  <input
                                    data-point-index="${index}"
                                    data-point-key="Conc"
                                    min="0"
                                    max="100"
                                    step="0.1"
                                    type="number"
                                    value="${formatInputValue(point.conc)}"
                                  />
                                </td>
                                <td class="table-action">
                                  <button class="icon-button" data-action="remove-point" data-point-index="${index}" type="button">
                                    Remove
                                  </button>
                                </td>
                              </tr>
                            `
                          )
                          .join("")
                  }
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function bindInteractions(params, points, analysisTime, viewMode) {
        root.querySelectorAll("[data-view-mode]").forEach((button) => {
          button.addEventListener("click", () => {
            const nextViewMode =
              button.getAttribute("data-view-mode") === "simple" ? "simple" : DEFAULT_VIEW_MODE;

            if (nextViewMode === currentViewMode) {
              return;
            }

            currentViewMode = nextViewMode;
            renderCurrentModel();
          });
        });

        if (viewMode !== "detail") {
          return;
        }

        const analysisInput = root.querySelector('[data-role="analysis-time"]');
        const startConcInput = root.querySelector('[data-role="start-conc"]');
        const endConcInput = root.querySelector('[data-role="end-conc"]');
        const addPointButton = root.querySelector('[data-action="add-point"]');

        if (analysisInput) {
          analysisInput.addEventListener("change", () => {
            const nextAnalysisTime = readNumber(analysisInput.value);

            if (nextAnalysisTime === null) {
              renderCurrentModel();
              return;
            }

            commitParams(params, points, nextAnalysisTime);
          });
        }

        if (startConcInput) {
          startConcInput.addEventListener("change", () => {
            const nextConc = readNumber(startConcInput.value);

            if (nextConc === null || points.length === 0) {
              renderCurrentModel();
              return;
            }

            const nextPoints = points.map((point, index) =>
              index === 0 ? { ...point, conc: clamp(nextConc, 0, 100) } : point
            );
            commitParams(params, nextPoints, analysisTime);
          });
        }

        if (endConcInput) {
          endConcInput.addEventListener("change", () => {
            const nextConc = readNumber(endConcInput.value);

            if (nextConc === null || points.length === 0) {
              renderCurrentModel();
              return;
            }

            const peakIndex = findPeakPointIndex(points);
            const nextPoints = points.map((point, index) =>
              index === peakIndex ? { ...point, conc: clamp(nextConc, 0, 100) } : point
            );
            commitParams(params, nextPoints, analysisTime);
          });
        }

        if (addPointButton) {
          addPointButton.addEventListener("click", () => {
            const nextPoints = createNextPoint(points, analysisTime);
            const nextAnalysisTime = Math.max(
              analysisTime,
              nextPoints.at(-1)?.time ?? analysisTime
            );
            commitParams(params, nextPoints, nextAnalysisTime);
          });
        }

        root.querySelectorAll("[data-point-key]").forEach((input) => {
          input.addEventListener("change", () => {
            const pointIndex = Number(input.getAttribute("data-point-index"));
            const pointKey = input.getAttribute("data-point-key");
            const nextValue = readNumber(input.value);

            if (!Number.isInteger(pointIndex) || nextValue === null || !pointKey) {
              renderCurrentModel();
              return;
            }

            const nextPoints = points.map((point, index) => {
              if (index !== pointIndex) {
                return point;
              }

              if (pointKey === "time") {
                return {
                  ...point,
                  time: Math.max(nextValue, 0)
                };
              }

              return {
                ...point,
                conc: clamp(nextValue, 0, 100)
              };
            });

            const normalizedPoints = sortPoints(nextPoints);
            const nextAnalysisTime = Math.max(
              analysisTime,
              normalizedPoints.at(-1)?.time ?? analysisTime
            );
            commitParams(params, normalizedPoints, nextAnalysisTime);
          });
        });

        root.querySelectorAll('[data-action="remove-point"]').forEach((button) => {
          button.addEventListener("click", () => {
            const pointIndex = Number(button.getAttribute("data-point-index"));

            if (!Number.isInteger(pointIndex)) {
              return;
            }

            const nextPoints = points.filter((_, index) => index !== pointIndex);
            const nextAnalysisTime = Math.max(
              nextPoints.at(-1)?.time ?? 0,
              nextPoints.length === 0 ? 0 : analysisTime
            );
            commitParams(params, nextPoints, nextAnalysisTime);
          });
        });
      }

      function commitParams(previousParams, points, analysisTime) {
        const nextPoints = sortPoints(points);
        const nextParams = {
          ...previousParams,
          "analysis-time": roundNumber(Math.max(analysisTime, 0)),
          "time-prog": nextPoints.map((point) => ({
            time: roundNumber(point.time),
            Conc: roundNumber(point.conc)
          }))
        };

        if (currentModel && isRecord(currentModel.block)) {
          currentModel = {
            ...currentModel,
            block: {
              ...currentModel.block,
              params: nextParams
            }
          };
        }

        renderCurrentModel();
        window.parent.postMessage(
          {
            payload: {
              params: nextParams
            },
            type: UPDATE_PARAMS_MESSAGE_TYPE
          },
          "*"
        );
      }

      function buildSegments(points, analysisTime) {
        const durations = [];

        if (points.length === 0) {
          durations.push(0, 0, 0, analysisTime);
        } else {
          durations.push(points[0].time);

          for (let index = 1; index < points.length; index += 1) {
            durations.push(points[index].time - points[index - 1].time);
          }
        }

        while (durations.length < 4) {
          durations.push(0);
        }

        if (durations.length > 4) {
          const head = durations.slice(0, 3);
          const tail = durations.slice(3).reduce((sum, value) => sum + value, 0);
          durations.length = 0;
          durations.push(...head, tail);
        }

        const accountedTime = durations.reduce((sum, value) => sum + value, 0);

        if (analysisTime > accountedTime) {
          durations[durations.length - 1] += analysisTime - accountedTime;
        }

        return [
          { duration: Math.max(durations[0], 0), label: "Start Hold" },
          { duration: Math.max(durations[1], 0), label: "Ramp" },
          { duration: Math.max(durations[2], 0), label: "Plateau" },
          { duration: Math.max(durations[3], 0), label: "Re-equil" }
        ];
      }

      function buildPolyline(points, analysisTime) {
        const safeTime = Math.max(analysisTime, points.at(-1)?.time ?? 1, 1);
        const normalizedPoints =
          points.length === 0
            ? [
                { conc: 5, time: 0 },
                { conc: 5, time: safeTime }
              ]
            : points;

        return normalizedPoints
          .map((point) => {
            const x = 6 + (clamp(point.time, 0, safeTime) / safeTime) * 88;
            const y = 92 - (clamp(point.conc, 0, 100) / 100) * 78;
            return `${roundNumber(x)},${roundNumber(y)}`;
          })
          .join(" ");
      }

      function createNextPoint(points, analysisTime) {
        if (points.length === 0) {
          return [
            { conc: 5, time: 0 },
            { conc: 95, time: Math.max(analysisTime * 0.6, 5) },
            { conc: 5, time: Math.max(analysisTime, 8) }
          ];
        }

        const lastPoint = points.at(-1);
        const nextTime = roundNumber((lastPoint?.time ?? 0) + 1);
        return [...points, { conc: lastPoint?.conc ?? 5, time: nextTime }];
      }

      function findPeakPointIndex(points) {
        let peakIndex = 0;

        for (let index = 1; index < points.length; index += 1) {
          if (points[index].conc > points[peakIndex].conc) {
            peakIndex = index;
          }
        }

        return peakIndex;
      }

      function inferAnalysisTime(points) {
        return points.at(-1)?.time ?? 10;
      }

      function readGradientPoints(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return sortPoints(
          value
            .map((item) => {
              if (!isRecord(item)) {
                return null;
              }

              const time = readNumber(item.time);
              const conc = readNumber(item.Conc);

              if (time === null || conc === null) {
                return null;
              }

              return {
                conc: clamp(conc, 0, 100),
                time: Math.max(time, 0)
              };
            })
            .filter(Boolean)
        );
      }

      function sortPoints(points) {
        return [...points].sort((left, right) => left.time - right.time);
      }

      function readNumber(value) {
        if (typeof value === "number" && Number.isFinite(value)) {
          return value;
        }

        if (typeof value === "string" && value.trim().length > 0) {
          const parsed = Number(value);
          return Number.isFinite(parsed) ? parsed : null;
        }

        return null;
      }

      function formatInputValue(value) {
        if (value === null || value === undefined || !Number.isFinite(value)) {
          return "";
        }

        return String(roundNumber(value));
      }

      function formatDisplayNumber(value, suffix) {
        if (value === null || value === undefined || !Number.isFinite(value)) {
          return "-";
        }

        return `${formatSegmentValue(value)} ${suffix}`;
      }

      function formatSegmentValue(value) {
        if (!Number.isFinite(value)) {
          return "-";
        }

        const normalized = Number.isInteger(value) ? String(value) : value.toFixed(2);
        return normalized.replace(/\.?0+$/, "");
      }

      function roundNumber(value) {
        return Math.round(value * 100) / 100;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function isRecord(value) {
        return typeof value === "object" && value !== null && !Array.isArray(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
