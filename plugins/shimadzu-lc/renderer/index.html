<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shimadzu LC Renderer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
        --vscode-bg: #f3f3f3;
        --vscode-panel: #ffffff;
        --vscode-sidebar: #f8f8f8;
        --vscode-toolbar: #f3f3f3;
        --vscode-border: #e5e5e5;
        --vscode-border-strong: #c8c8c8;
        --vscode-text: #1f1f1f;
        --vscode-muted: #616161;
        --vscode-subtle: #8a8a8a;
        --vscode-accent: #0078d4;
        --vscode-accent-soft: #eff6fc;
        --vscode-danger: #a1260d;
        --vscode-danger-bg: #f6eceb;
        --vscode-input: #ffffff;
        background: var(--vscode-bg);
        color: var(--vscode-text);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--vscode-bg);
      }

      body {
        padding: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        background: rgba(0, 120, 212, 0.05);
      }

      input:focus-visible,
      button:focus-visible {
        outline: 1px solid var(--vscode-accent);
        outline-offset: -1px;
      }

      .card {
        display: grid;
        gap: 0;
        min-height: 0;
        border: 0;
        border-radius: 0;
        background: var(--vscode-panel);
        box-shadow: none;
      }

      .card code {
        padding: 1px 4px;
        border: 1px solid var(--vscode-border);
        border-radius: 2px;
        background: #f8f8f8;
        font-family: Consolas, "Courier New", monospace;
        font-size: 11px;
      }

      .empty {
        display: grid;
        min-height: 180px;
        place-items: center;
        color: var(--vscode-muted);
        font-size: 13px;
      }

      .heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-sidebar);
      }

      .eyebrow,
      .field-label,
      .table th {
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .eyebrow {
        display: block;
        margin-bottom: 4px;
        color: var(--vscode-subtle);
        font-size: 11px;
        font-weight: 600;
      }

      .title {
        margin: 0;
        color: var(--vscode-text);
        font-size: 18px;
        font-weight: 600;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--vscode-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .heading-actions {
        display: grid;
        gap: 8px;
        justify-items: end;
      }

      .note-shell {
        display: grid;
        min-height: 0;
        background: #ffffff;
      }

      .note-doc {
        display: grid;
        align-content: start;
        gap: 8px;
        padding: 8px 12px 10px;
      }

      .note-doc__figure {
        display: grid;
        align-content: start;
        gap: 6px;
        justify-items: start;
      }

      .note-doc__figure-header {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        width: min(100%, 520px);
      }

      .note-doc__figure-frame {
        width: min(100%, 520px);
      }

      .run-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        width: 100%;
      }

      .run-actions .button {
        min-width: 136px;
      }

      .pills {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }

      .pill,
      .sync {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        border: 1px solid var(--vscode-border);
        border-radius: 2px;
        background: var(--vscode-panel);
        color: var(--vscode-muted);
        font-size: 11px;
        font-weight: 500;
      }

      .sync::before {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--vscode-accent);
        content: "";
      }

      .workspace {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        gap: 0;
        min-height: 360px;
      }

      .sidebar {
        display: grid;
        gap: 0;
        align-content: start;
        border-right: 1px solid var(--vscode-border);
        background: var(--vscode-sidebar);
      }

      .field-card,
      .metric {
        padding: 12px 14px;
        border: 0;
        border-bottom: 1px solid var(--vscode-border);
        border-radius: 0;
        background: transparent;
      }

      .field-label {
        display: block;
        margin-bottom: 6px;
        color: var(--vscode-subtle);
        font-size: 10px;
        font-weight: 600;
      }

      .field-input,
      .axis-field input,
      .table input {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid var(--vscode-border-strong);
        border-radius: 2px;
        background: var(--vscode-input);
        color: var(--vscode-text);
        font-size: 12px;
        box-shadow: none;
      }

      .field-suffix {
        margin-top: 6px;
        color: var(--vscode-muted);
        font-size: 11px;
        line-height: 1.5;
      }

      .metrics {
        display: grid;
        gap: 0;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        color: var(--vscode-text);
        font-size: 18px;
        font-weight: 600;
      }

      .chart-panel {
        display: grid;
        gap: 0;
        background: var(--vscode-panel);
      }

      .chart-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
      }

      .mode-switch {
        display: inline-flex;
        gap: 0;
        border: 1px solid var(--vscode-border);
        border-radius: 0;
        background: var(--vscode-panel);
        margin-left: auto;
      }

      .mode-button {
        padding: 7px 12px;
        border: 0;
        border-right: 1px solid var(--vscode-border);
        border-radius: 0;
        background: transparent;
        color: var(--vscode-muted);
        font-size: 12px;
        font-weight: 500;
      }

      .mode-button:last-child {
        border-right: 0;
      }

      .mode-button.is-active {
        background: var(--vscode-accent-soft);
        color: var(--vscode-text);
        box-shadow: inset 0 -2px 0 var(--vscode-accent);
      }

      .panel-shell {
        display: grid;
        grid-template-columns: 144px minmax(0, 1fr);
        gap: 0;
        overflow: hidden;
        background: var(--vscode-panel);
        border: 1px solid #d7d7d7;
      }

      .panel-sidebar {
        padding: 14px;
        border-right: 1px solid var(--vscode-border);
        background: var(--vscode-sidebar);
      }

      .panel-title {
        color: var(--vscode-text);
        font-size: 12px;
        font-weight: 600;
      }

      .panel-helper {
        margin-top: 8px;
        color: var(--vscode-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .radio-line {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        color: var(--vscode-muted);
        font-size: 11px;
      }

      .radio-line span::before {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 12px;
        height: 12px;
        margin-right: 5px;
        border: 1px solid var(--vscode-border-strong);
        border-radius: 999px;
        background: var(--vscode-panel);
        color: var(--vscode-accent);
        font-size: 9px;
        content: "";
      }

      .radio-line span.is-active::before {
        content: "●";
      }

      .axis-field {
        display: grid;
        gap: 4px;
        margin-top: 14px;
      }

      .axis-caption {
        color: var(--vscode-subtle);
        font-size: 10px;
        font-weight: 600;
      }

      .graph-area {
        position: relative;
        min-height: 264px;
        padding: 18px 18px 48px;
        background: #fbfbfb;
      }

      .graph-grid {
        position: absolute;
        inset: 18px 18px 48px;
        border: 1px solid var(--vscode-border);
        background-image:
          linear-gradient(to right, rgba(127, 127, 127, 0.12) 1px, transparent 1px),
          linear-gradient(to top, rgba(127, 127, 127, 0.1) 1px, transparent 1px);
        background-size: 18% 100%, 100% 24%;
      }

      .graph-template {
        position: absolute;
        inset: 26px 28px 58px 36px;
        width: calc(100% - 64px);
        height: calc(100% - 84px);
        object-fit: contain;
        opacity: 0.22;
        filter: saturate(0.85);
        pointer-events: none;
      }

      .graph-overlay,
      .graph-line {
        position: absolute;
        inset: 18px 18px 48px;
        width: calc(100% - 36px);
        height: calc(100% - 66px);
      }

      .graph-line {
        overflow: visible;
      }

      .graph-line polyline {
        fill: none;
        stroke: #d13438;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 3;
        filter: none;
      }

      .graph-axis-top,
      .graph-axis-bottom {
        position: absolute;
        left: 22px;
        right: 22px;
        display: flex;
        justify-content: space-between;
        color: var(--vscode-subtle);
        font-size: 10px;
        font-weight: 600;
      }

      .graph-axis-top {
        top: 8px;
      }

      .graph-axis-bottom {
        bottom: 18px;
      }

      .segment-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
      }

      .segment {
        padding: 10px 12px;
        border-right: 1px solid var(--vscode-border);
        background: transparent;
      }

      .segment:last-child {
        border-right: 0;
      }

      .segment strong {
        display: block;
        margin-top: 3px;
        color: var(--vscode-text);
        font-size: 14px;
        font-weight: 600;
      }

      .simple-shell {
        display: grid;
        gap: 0;
      }

      .simple-frame {
        display: grid;
        gap: 0;
        padding: 0;
        background: transparent;
      }

      .simple-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .simple-header p {
        margin: 6px 0 0;
        color: var(--vscode-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .simple-figure {
        display: block;
        min-height: 0;
        margin: 0;
        padding: 0;
        border: 1px solid #d7d7d7;
        border-radius: 0;
        background: #ffffff;
      }

      .simple-gradient-editor {
        display: grid;
        grid-template-columns: 86px minmax(0, 1fr);
        grid-template-rows: auto 62px;
        grid-template-areas:
          "y-axis graph"
          ". x-axis";
        align-items: stretch;
        width: 100%;
        background: #ffffff;
      }

      .simple-axis {
        position: relative;
        min-width: 0;
        min-height: 0;
      }

      .simple-axis--y {
        grid-area: y-axis;
      }

      .simple-axis--x {
        grid-area: x-axis;
      }

      .simple-axis-title {
        position: absolute;
        color: #555f67;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        pointer-events: none;
      }

      .simple-axis-title--y {
        left: 7px;
        top: 50%;
        transform: translateY(-50%) rotate(180deg);
        writing-mode: vertical-rl;
      }

      .simple-axis-title--x {
        right: 6px;
        bottom: 3px;
      }

      .simple-image {
        grid-area: graph;
        display: block;
        width: 100%;
        height: auto;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        background: #ffffff;
      }

      .gradient-label {
        position: absolute;
        display: grid;
        gap: 2px;
        width: 58px;
        color: #1f1f1f;
        font-size: 9px;
        font-weight: 600;
      }

      .simple-axis--x .gradient-label {
        width: 82px;
      }

      .gradient-label__text {
        display: block;
        min-height: 20px;
        color: #4d5963;
        font-size: 9px;
        font-weight: 700;
        line-height: 1.12;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .gradient-label input {
        width: 100%;
        padding: 4px 6px;
        border: 1px solid #bdbdbd;
        border-radius: 2px;
        background: #ffffff;
        color: #1f1f1f;
        font-size: 11px;
        line-height: 1.2;
      }

      .gradient-label--initial-conc {
        right: 8px;
        top: 74.5%;
        transform: translateY(calc(-50% - 11px));
      }

      .gradient-label--final-conc {
        right: 8px;
        top: 31%;
        transform: translateY(calc(-50% - 11px));
      }

      .gradient-label--initial-hold {
        left: 17.5%;
        top: 5px;
        transform: translateX(-50%);
      }

      .gradient-label--gradient-time {
        left: 41%;
        top: 5px;
        transform: translateX(-50%);
      }

      .gradient-label--final-switch-time {
        left: 64%;
        top: 5px;
        transform: translateX(-50%);
      }

      .gradient-label--analysis-end-time {
        left: 88%;
        top: 5px;
        transform: translateX(-50%);
      }

      .simple-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        border-top: 1px solid var(--vscode-border);
        border-left: 1px solid var(--vscode-border);
      }

      .simple-chip {
        flex: 1 1 120px;
        padding: 9px 10px;
        border-right: 1px solid var(--vscode-border);
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-panel);
        color: var(--vscode-muted);
        font-size: 11px;
        font-weight: 500;
      }

      .editor {
        display: grid;
        gap: 0;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-panel);
      }

      .editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
      }

      .editor-header p {
        margin: 0;
        color: var(--vscode-muted);
        font-size: 12px;
      }

      .editor-actions {
        display: flex;
        gap: 8px;
      }

      .button {
        padding: 7px 12px;
        border: 1px solid var(--vscode-border-strong);
        border-radius: 2px;
        background: var(--vscode-panel);
        color: var(--vscode-text);
        font-size: 12px;
        font-weight: 500;
      }

      .button--accent {
        border-color: var(--vscode-accent);
        background: var(--vscode-accent);
        color: #ffffff;
      }

      .button--accent:hover {
        background: #106ebe;
      }

      .button--ghost {
        border-color: var(--vscode-border);
        background: var(--vscode-panel);
        color: var(--vscode-muted);
      }

      .table-shell {
        overflow: hidden;
        background: var(--vscode-panel);
      }

      .table {
        width: 100%;
        border-collapse: collapse;
      }

      .table th,
      .table td {
        padding: 9px 10px;
        border-bottom: 1px solid var(--vscode-border);
        text-align: left;
      }

      .table th {
        color: var(--vscode-muted);
        font-size: 10px;
        font-weight: 600;
        background: var(--vscode-toolbar);
      }

      .table td {
        color: var(--vscode-text);
        font-size: 12px;
        background: var(--vscode-panel);
      }

      .table tr:last-child td {
        border-bottom: 0;
      }

      .table-index {
        width: 56px;
        color: var(--vscode-muted);
        font-weight: 600;
      }

      .table-action {
        width: 72px;
        text-align: right;
      }

      .icon-button {
        padding: 5px 8px;
        border: 1px solid #d9c2bd;
        border-radius: 2px;
        background: var(--vscode-panel);
        color: var(--vscode-danger);
        font-size: 11px;
        font-weight: 500;
      }

      .icon-button:hover {
        background: var(--vscode-danger-bg);
      }

      .footer-note {
        padding: 10px 14px;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-toolbar);
        color: var(--vscode-muted);
        font-size: 11px;
        line-height: 1.5;
      }

      .action-status {
        display: grid;
        gap: 6px;
        padding: 12px 14px;
        border-top: 1px solid var(--vscode-border);
        background: var(--vscode-panel);
      }

      .action-status--running {
        background: #f7fbff;
      }

      .action-status--success {
        background: #f3fbf6;
      }

      .action-status--error {
        background: #fdf4f2;
      }

      .action-status__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .action-status__title {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
      }

      .action-status__meta {
        color: var(--vscode-subtle);
        font-size: 11px;
      }

      .action-status__log {
        margin: 0;
        padding-left: 18px;
        color: var(--vscode-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .action-status__log li + li {
        margin-top: 3px;
      }

      @media (max-width: 860px) {
        body {
          padding: 0;
        }

        .card {
          border-left: 0;
          border-right: 0;
        }

        .heading {
          padding: 12px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--vscode-border);
        }

        .segment-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .panel-shell {
          grid-template-columns: 1fr;
        }

        .panel-sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--vscode-border);
        }

        .heading-actions,
        .pills {
          justify-content: flex-start;
          justify-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="card" id="root">
      <div class="empty">Shimadzu LC renderer is ready.</div>
    </div>
    <script>
      const root = document.getElementById("root");
      const ACTION_REQUEST_MESSAGE_TYPE = "integral:request-action";
      const ACTION_STATE_MESSAGE_TYPE = "integral:action-state";
      const SET_BLOCK_MESSAGE_TYPE = "integral:set-block";
      const UPDATE_PARAMS_MESSAGE_TYPE = "integral:update-params";
      const DEFAULT_INITIAL_CONC = 5;
      const DEFAULT_FINAL_CONC = 95;
      const DEFAULT_INITIAL_HOLD_TIME = 2;
      const DEFAULT_GRADIENT_TIME = 8;
      const DEFAULT_POST_GRADIENT_TIME = 2;

      let currentModel = null;
      let currentActionState = createIdleActionState();

      window.addEventListener("message", (event) => {
        if (!event.data) {
          return;
        }

        if (event.data.type === SET_BLOCK_MESSAGE_TYPE) {
          currentModel = event.data.payload;
          renderCurrentModel();
          return;
        }

        if (event.data.type === ACTION_STATE_MESSAGE_TYPE) {
          currentActionState = readActionState(event.data.payload);
          renderCurrentModel();
        }
      });

      function renderCurrentModel() {
        if (!currentModel) {
          root.innerHTML = '<div class="empty">Shimadzu LC renderer is ready.</div>';
          return;
        }

        const block = isRecord(currentModel.block) ? currentModel.block : {};
        const params = isRecord(block.params) ? { ...block.params } : {};
        const points = readGradientPoints(params["time-prog"]);
        const analysisTime = readNumber(params["analysis-time"]) ?? inferAnalysisTime(points);
        const gradientSettings = deriveStaticGradientSettings(points, analysisTime);

        root.innerHTML = `
          <div class="note-shell">
            <div class="note-doc">
              <div class="note-doc__figure">
                <div class="note-doc__figure-header">
                  ${renderActionButtonsMarkup()}
                </div>
                <div class="note-doc__figure-frame">
                  ${renderSimplePanelMarkup({
                    gradientSettings
                  })}
                </div>
              </div>

              ${renderActionStatusMarkup()}
            </div>
          </div>
        `;

        bindInteractions(params, gradientSettings);
      }

      function renderActionButtonsMarkup() {
        const actions = readPluginActions();

        if (actions.length === 0) {
          return "";
        }

        return `
          <div class="run-actions">
            ${actions
              .map((action) => {
                const isRunning =
                  currentActionState.status === "running" && currentActionState.actionId === action.id;
                const label = isRunning ? action.busyLabel : action.label;

                return `
                  <button
                    class="button button--accent"
                    data-action="request-plugin-action"
                    data-action-id="${escapeHtmlAttribute(action.id)}"
                    type="button"
                    ${currentActionState.status === "running" ? "disabled" : ""}
                  >
                    ${escapeHtml(label)}
                  </button>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function renderActionStatusMarkup() {
        if (currentActionState.status === "idle" || !currentActionState.summary) {
          return "";
        }

        const meta =
          currentActionState.status === "running"
            ? "plugin host を呼び出し中"
            : currentActionState.finishedAt
              ? `finished ${escapeHtml(formatShortTimestamp(currentActionState.finishedAt))}`
              : `status ${escapeHtml(currentActionState.status)}`;

        return `
          <div class="action-status action-status--${escapeHtmlAttribute(currentActionState.status)}">
            <div class="action-status__header">
              <p class="action-status__title">${escapeHtml(currentActionState.summary)}</p>
              <span class="action-status__meta">${meta}</span>
            </div>
            ${
              currentActionState.logLines.length > 0
                ? `
                  <ul class="action-status__log">
                    ${currentActionState.logLines
                      .map((line) => `<li>${escapeHtml(line)}</li>`)
                      .join("")}
                  </ul>
                `
                : ""
            }
          </div>
        `;
      }

      function renderSimplePanelMarkup({ gradientSettings }) {
        return `
          <div class="simple-shell">
            <div class="simple-frame">
              <figure class="simple-figure">
                <div class="simple-gradient-editor">
                  <div class="simple-axis simple-axis--y">
                    <div class="simple-axis-title simple-axis-title--y">B.Conc</div>
                    ${renderGradientAxisInputMarkup({
                      className: "gradient-label--initial-conc",
                      key: "initialConc",
                      label: "初期濃度",
                      max: 100,
                      min: 0,
                      suffix: "%",
                      value: gradientSettings.initialConc
                    })}
                    ${renderGradientAxisInputMarkup({
                      className: "gradient-label--final-conc",
                      key: "finalConc",
                      label: "最終濃度",
                      max: 100,
                      min: 0,
                      suffix: "%",
                      value: gradientSettings.finalConc
                    })}
                  </div>
                  <img alt="Gradient simple preview" class="simple-image" src="../gradient.png" />
                  <div class="simple-axis simple-axis--x">
                    <div class="simple-axis-title simple-axis-title--x">Time</div>
                    ${renderGradientAxisInputMarkup({
                      className: "gradient-label--initial-hold",
                      key: "initialHoldTime",
                      label: "グラジエント開始時刻",
                      min: 0,
                      suffix: "min",
                      value: gradientSettings.initialHoldTime
                    })}
                    ${renderGradientAxisInputMarkup({
                      className: "gradient-label--gradient-time",
                      key: "gradientTime",
                      label: "グラジエント時間",
                      min: 0,
                      suffix: "min",
                      value: gradientSettings.gradientTime
                    })}
                    ${renderGradientAxisInputMarkup({
                      className: "gradient-label--final-switch-time",
                      key: "finalSwitchTime",
                      label: "最終濃度切替時刻",
                      min: 0,
                      suffix: "min",
                      value: gradientSettings.finalSwitchTime
                    })}
                    ${renderGradientAxisInputMarkup({
                      className: "gradient-label--analysis-end-time",
                      key: "analysisEndTime",
                      label: "分析終了時刻",
                      min: 0,
                      suffix: "min",
                      value: gradientSettings.analysisEndTime
                    })}
                  </div>
                </div>
              </figure>
            </div>
          </div>
        `;
      }

      function renderGradientAxisInputMarkup({ className, key, label, max, min, suffix, value }) {
        return `
          <label class="gradient-label ${escapeHtmlAttribute(className)}">
            <span class="gradient-label__text">${escapeHtml(label)}</span>
            <input
              aria-label="${escapeHtmlAttribute(`${label} ${suffix}`)}"
              data-gradient-setting="${escapeHtmlAttribute(key)}"
              ${max === undefined ? "" : `max="${escapeHtmlAttribute(max)}"`}
              ${min === undefined ? "" : `min="${escapeHtmlAttribute(min)}"`}
              step="0.1"
              type="number"
              value="${formatInputValue(value)}"
            />
          </label>
        `;
      }

      function bindInteractions(params, gradientSettings) {
        root.querySelectorAll('[data-action="request-plugin-action"]').forEach((button) => {
          button.addEventListener("click", () => {
            const actionId = button.getAttribute("data-action-id");

            if (!actionId || currentActionState.status === "running") {
              return;
            }

            const action = readPluginActions().find((candidate) => candidate.id === actionId);
            currentActionState = createPendingActionState(action);
            renderCurrentModel();

            window.parent.postMessage(
              {
                payload: {
                  actionId
                },
                type: ACTION_REQUEST_MESSAGE_TYPE
              },
              "*"
            );
          });
        });

        root.querySelectorAll("[data-gradient-setting]").forEach((input) => {
          input.addEventListener("change", () => {
            const key = input.getAttribute("data-gradient-setting");
            const nextValue = readNumber(input.value);

            if (nextValue === null || !key) {
              renderCurrentModel();
              return;
            }

            commitStaticGradientSetting(params, gradientSettings, key, nextValue);
          });
        });
      }

      function commitStaticGradientSetting(previousParams, settings, key, value) {
        const nextSettings = { ...settings };

        switch (key) {
          case "initialConc":
            nextSettings.initialConc = clamp(value, 0, 100);
            break;
          case "finalConc":
            nextSettings.finalConc = clamp(value, 0, 100);
            break;
          case "initialHoldTime":
            nextSettings.initialHoldTime = Math.max(value, 0);
            break;
          case "gradientTime":
            nextSettings.gradientTime = Math.max(value, 0);
            break;
          case "finalSwitchTime":
            nextSettings.finalSwitchTime = Math.max(value, nextSettings.initialHoldTime);
            nextSettings.gradientTime = Math.max(
              nextSettings.finalSwitchTime - nextSettings.initialHoldTime,
              0
            );
            break;
          case "analysisEndTime":
            nextSettings.analysisEndTime = Math.max(value, 0);
            break;
          default:
            renderCurrentModel();
            return;
        }

        const nextEndTime = nextSettings.initialHoldTime + nextSettings.gradientTime;
        const nextAnalysisTime = Math.max(nextEndTime, nextSettings.analysisEndTime);
        commitParams(
          previousParams,
          [
            {
              conc: nextSettings.initialConc,
              time: 0
            },
            {
              conc: nextSettings.initialConc,
              time: nextSettings.initialHoldTime
            },
            {
              conc: nextSettings.finalConc,
              time: nextEndTime
            }
          ],
          nextAnalysisTime
        );
      }

      function commitParams(previousParams, points, analysisTime) {
        const nextPoints = sortPoints(points);
        const nextParams = {
          ...previousParams,
          "analysis-time": roundNumber(Math.max(analysisTime, 0)),
          "time-prog": nextPoints.map((point) => ({
            time: roundNumber(point.time),
            Conc: roundNumber(point.conc)
          }))
        };

        if (currentModel && isRecord(currentModel.block)) {
          currentModel = {
            ...currentModel,
            block: {
              ...currentModel.block,
              params: nextParams
            }
          };
        }

        renderCurrentModel();
        window.parent.postMessage(
          {
            payload: {
              params: nextParams
            },
            type: UPDATE_PARAMS_MESSAGE_TYPE
          },
          "*"
        );
      }

      function deriveStaticGradientSettings(points, analysisTime) {
        if (points.length === 0) {
          const endTime = DEFAULT_INITIAL_HOLD_TIME + DEFAULT_GRADIENT_TIME;
          return {
            analysisEndTime: Math.max(analysisTime, endTime + DEFAULT_POST_GRADIENT_TIME),
            finalConc: DEFAULT_FINAL_CONC,
            finalSwitchTime: endTime,
            gradientTime: DEFAULT_GRADIENT_TIME,
            initialConc: DEFAULT_INITIAL_CONC,
            initialHoldTime: DEFAULT_INITIAL_HOLD_TIME
          };
        }

        const initialConc = points[0]?.conc ?? DEFAULT_INITIAL_CONC;
        const peakIndex = findPeakPointIndex(points);
        const peakPoint = points[peakIndex] ?? points.at(-1);
        const finalConc = peakPoint?.conc ?? DEFAULT_FINAL_CONC;
        const initialHoldTime = inferInitialHoldTime(points, initialConc);
        const gradientEndTime = Math.max(peakPoint?.time ?? initialHoldTime, initialHoldTime);
        const gradientTime = Math.max(gradientEndTime - initialHoldTime, 0);
        const minimumAnalysisTime = initialHoldTime + gradientTime;
        const analysisEndTime = Math.max(analysisTime, minimumAnalysisTime);

        return {
          analysisEndTime,
          finalConc,
          finalSwitchTime: gradientEndTime,
          gradientTime,
          initialConc,
          initialHoldTime
        };
      }

      function inferInitialHoldTime(points, initialConc) {
        if (points.length >= 2 && nearlyEqual(points[0].time, 0) && nearlyEqual(points[1].conc, initialConc)) {
          return Math.max(points[1].time, 0);
        }

        if (points.length >= 1 && nearlyEqual(points[0].conc, initialConc)) {
          return Math.max(points[0].time, 0);
        }

        return DEFAULT_INITIAL_HOLD_TIME;
      }

      function findPeakPointIndex(points) {
        let peakIndex = 0;

        for (let index = 1; index < points.length; index += 1) {
          if (points[index].conc > points[peakIndex].conc) {
            peakIndex = index;
          }
        }

        return peakIndex;
      }

      function inferAnalysisTime(points) {
        return points.at(-1)?.time ?? 10;
      }

      function readGradientPoints(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return sortPoints(
          value
            .map((item) => {
              if (!isRecord(item)) {
                return null;
              }

              const time = readNumber(item.time);
              const conc = readNumber(item.Conc);

              if (time === null || conc === null) {
                return null;
              }

              return {
                conc: clamp(conc, 0, 100),
                time: Math.max(time, 0)
              };
            })
            .filter(Boolean)
        );
      }

      function sortPoints(points) {
        return [...points].sort((left, right) => left.time - right.time);
      }

      function readPluginActions() {
        const actions = currentModel?.blockDefinition?.actions;

        if (!Array.isArray(actions)) {
          return [];
        }

        return actions
          .map((action) => {
            if (!isRecord(action)) {
              return null;
            }

            const id = typeof action.id === "string" ? action.id.trim() : "";
            const label = typeof action.label === "string" ? action.label.trim() : "";
            const busyLabel = typeof action.busyLabel === "string" ? action.busyLabel.trim() : "";

            if (!id || !label || !busyLabel) {
              return null;
            }

            return { busyLabel, id, label };
          })
          .filter(Boolean);
      }

      function readActionState(value) {
        if (!isRecord(value)) {
          return createIdleActionState();
        }

        const actionId = typeof value.actionId === "string" && value.actionId.trim() ? value.actionId : null;
        const status = readActionStatus(value.status);
        const summary = typeof value.summary === "string" && value.summary.trim() ? value.summary : null;
        const startedAt =
          typeof value.startedAt === "string" && value.startedAt.trim() ? value.startedAt : null;
        const finishedAt =
          typeof value.finishedAt === "string" && value.finishedAt.trim() ? value.finishedAt : null;
        const logLines = Array.isArray(value.logLines)
          ? value.logLines
              .map((line) => (typeof line === "string" ? line : null))
              .filter(Boolean)
          : [];

        return {
          actionId,
          finishedAt,
          logLines,
          startedAt,
          status,
          summary
        };
      }

      function readActionStatus(value) {
        switch (value) {
          case "running":
          case "success":
          case "error":
            return value;
          default:
            return "idle";
        }
      }

      function createIdleActionState() {
        return {
          actionId: null,
          finishedAt: null,
          logLines: [],
          startedAt: null,
          status: "idle",
          summary: null
        };
      }

      function createPendingActionState(action) {
        if (!action) {
          return {
            actionId: null,
            finishedAt: null,
            logLines: [],
            startedAt: new Date().toISOString(),
            status: "running",
            summary: "plugin host を呼び出しています。"
          };
        }

        return {
          actionId: action.id,
          finishedAt: null,
          logLines: [],
          startedAt: new Date().toISOString(),
          status: "running",
          summary: action.busyLabel
        };
      }

      function readNumber(value) {
        if (typeof value === "number" && Number.isFinite(value)) {
          return value;
        }

        if (typeof value === "string" && value.trim().length > 0) {
          const parsed = Number(value);
          return Number.isFinite(parsed) ? parsed : null;
        }

        return null;
      }

      function formatInputValue(value) {
        if (value === null || value === undefined || !Number.isFinite(value)) {
          return "";
        }

        return String(roundNumber(value));
      }

      function formatDisplayNumber(value, suffix) {
        if (value === null || value === undefined || !Number.isFinite(value)) {
          return "-";
        }

        return `${formatSegmentValue(value)} ${suffix}`;
      }

      function formatSegmentValue(value) {
        if (!Number.isFinite(value)) {
          return "-";
        }

        const normalized = Number.isInteger(value) ? String(value) : value.toFixed(2);
        return normalized.replace(/\.?0+$/, "");
      }

      function formatShortTimestamp(value) {
        const timestamp = new Date(value);

        if (Number.isNaN(timestamp.getTime())) {
          return value;
        }

        return timestamp.toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      }

      function roundNumber(value) {
        return Math.round(value * 100) / 100;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function nearlyEqual(left, right) {
        return Math.abs(left - right) < 0.0001;
      }

      function isRecord(value) {
        return typeof value === "object" && value !== null && !Array.isArray(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeHtmlAttribute(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
