<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Compare Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --panel-subtle: #fbfcfe;
        --border: #d7dce3;
        --border-strong: #b7c0cc;
        --text: #1f2733;
        --text-muted: #5f6b7a;
        --text-subtle: #8390a0;
        --accent: #0f6cbd;
        --accent-soft: #edf6ff;
        --danger: #9a3412;
        --success: #15803d;
        background: var(--bg);
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        min-width: 0;
        min-height: 0;
      }

      body,
      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible,
      [role="button"]:focus-visible {
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }

      .viewer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
        gap: 12px;
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        padding: 10px;
        outline: none;
      }

      .viewer--empty {
        grid-template-columns: minmax(0, 1fr);
        place-items: center;
        background: var(--panel);
      }

      .message {
        display: grid;
        gap: 8px;
        max-width: 48ch;
        color: var(--text-muted);
        text-align: center;
      }

      .message strong {
        color: var(--text);
      }

      .message p {
        margin: 0;
      }

      .main,
      .panel {
        min-width: 0;
        min-height: 0;
      }

      .main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
      }

      .toolbar,
      .actions,
      .layer-header,
      .control,
      .transform-header {
        display: flex;
        align-items: center;
      }

      .toolbar {
        justify-content: space-between;
        gap: 10px;
        min-height: 30px;
      }

      .title {
        display: grid;
        min-width: 0;
      }

      .title strong {
        overflow: hidden;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title span {
        color: var(--text-muted);
        font-size: 11px;
      }

      .actions {
        justify-content: flex-end;
        gap: 6px;
      }

      .button {
        min-height: 24px;
        padding: 0 8px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: #ffffff;
        color: var(--text);
        font-size: 12px;
      }

      .button:hover {
        background: #f4f8fc;
      }

      .segmented {
        display: inline-grid;
        grid-template-columns: repeat(2, minmax(42px, 1fr));
        overflow: hidden;
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        background: #ffffff;
      }

      .segment {
        min-height: 24px;
        padding: 0 8px;
        border: 0;
        border-right: 1px solid var(--border-strong);
        background: transparent;
        color: var(--text-muted);
        font-size: 12px;
      }

      .segment:last-child {
        border-right: 0;
      }

      .segment[aria-pressed="true"] {
        background: #dbeafe;
        color: #174a7c;
        font-weight: 600;
      }

      .stage-shell {
        display: grid;
        min-width: 0;
        min-height: 0;
        place-items: center;
        overflow: auto;
        border: 1px solid var(--border);
        background:
          linear-gradient(45deg, #eef1f5 25%, transparent 25%),
          linear-gradient(-45deg, #eef1f5 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #eef1f5 75%),
          linear-gradient(-45deg, transparent 75%, #eef1f5 75%);
        background-color: #ffffff;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        background-size: 16px 16px;
      }

      .stage {
        position: relative;
        width: min(100%, 1200px);
        max-height: 100%;
        overflow: hidden;
        background: #ffffff;
        box-shadow: inset 0 0 0 1px rgba(30, 41, 59, 0.12);
      }

      .stage-image {
        position: absolute;
        max-width: none;
        max-height: none;
        border: 0;
        object-fit: fill;
        pointer-events: none;
        transform-origin: center;
        user-select: none;
      }

      .stage-image.is-active {
        outline: 1px solid rgba(15, 108, 189, 0.42);
        outline-offset: -1px;
      }

      .stage-status {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 1000;
        min-width: 160px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--text-muted);
        font-size: 12px;
        text-align: center;
        transform: translate(-50%, -50%);
      }

      .stage-status--error,
      .error {
        color: var(--danger);
      }

      .panel {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 10px;
        overflow: hidden;
        border-left: 1px solid var(--border);
        padding-left: 12px;
      }

      .layer-list {
        display: grid;
        align-content: start;
        gap: 8px;
        min-height: 0;
        overflow: auto;
        padding-right: 2px;
      }

      .layer,
      .transform {
        display: grid;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel-subtle);
        padding: 8px;
      }

      .layer {
        cursor: pointer;
      }

      .layer.is-active {
        border-color: #8ebce6;
        background: var(--accent-soft);
      }

      .layer.is-dragging {
        opacity: 0.62;
      }

      .layer-header {
        gap: 8px;
        min-width: 0;
      }

      .drag-handle {
        color: var(--text-subtle);
        font-family: Consolas, "Cascadia Code", monospace;
        font-size: 12px;
        letter-spacing: 0;
      }

      .layer-title {
        display: grid;
        flex: 1;
        min-width: 0;
      }

      .layer-title strong,
      .layer-title span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .layer-title strong {
        color: var(--text);
        font-size: 12px;
      }

      .layer-title span {
        color: var(--text-muted);
        font-size: 11px;
      }

      .layer-state {
        min-width: 34px;
        color: var(--text-subtle);
        font-size: 11px;
        font-weight: 700;
        text-align: right;
      }

      .layer-state.is-ready {
        color: var(--success);
      }

      .layer-state.is-error {
        color: #b45309;
      }

      .control {
        display: grid;
        grid-template-columns: 56px minmax(0, 1fr) 44px;
        gap: 8px;
        min-width: 0;
        color: var(--text-muted);
        font-size: 12px;
      }

      .control input[type="range"] {
        width: 100%;
      }

      .control output {
        color: var(--text);
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      .error {
        margin: 0;
        font-size: 11px;
      }

      .transform-header {
        justify-content: space-between;
        gap: 8px;
      }

      .transform-header strong {
        overflow: hidden;
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .control--transform {
        grid-template-columns: 62px minmax(0, 1fr) 64px;
      }

      .number {
        width: 64px;
        min-width: 0;
        padding: 2px 4px;
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        color: var(--text);
        font-size: 12px;
      }

      @media (max-width: 920px) {
        .viewer {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: minmax(0, 1fr) minmax(220px, 42vh);
        }

        .panel {
          grid-template-columns: minmax(0, 1fr) minmax(260px, 320px);
          grid-template-rows: minmax(0, 1fr);
          border-left: 0;
          border-top: 1px solid var(--border);
          padding-left: 0;
          padding-top: 10px;
        }
      }

      @media (max-width: 640px) {
        .toolbar,
        .panel {
          align-items: stretch;
          grid-template-columns: minmax(0, 1fr);
        }

        .toolbar {
          display: grid;
        }

        .actions {
          justify-content: flex-start;
        }
      }

      .viewer--embed {
        grid-template-columns: minmax(0, 1fr) minmax(250px, 320px);
        grid-template-rows: minmax(0, 1fr);
        gap: 8px;
        padding: 8px;
      }

      .viewer--embed .panel {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        border-top: 0;
        border-left: 1px solid var(--border);
        padding-top: 0;
        padding-left: 10px;
      }

      .viewer--embed .stage-shell {
        min-height: 180px;
      }

      @media (max-width: 680px) {
        .viewer--embed {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: minmax(180px, 1fr) minmax(180px, 42vh);
        }

        .viewer--embed .panel {
          grid-template-columns: minmax(0, 1fr) minmax(240px, 300px);
          grid-template-rows: minmax(0, 1fr);
          border-left: 0;
          border-top: 1px solid var(--border);
          padding-left: 0;
          padding-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const SET_VIEWER_MESSAGE = "integral:set-viewer";
      const RESOLVE_WORKSPACE_FILE_URL_MESSAGE = "integral:viewer-resolve-workspace-file-url";
      const RESOLVE_WORKSPACE_FILE_URL_RESULT_MESSAGE =
        "integral:viewer-resolve-workspace-file-url-result";

      const app = document.getElementById("app");
      const pendingUrlRequests = new Map();
      let state = createInitialState();
      let loadRevision = 0;

      window.addEventListener("message", (event) => {
        const message = event.data;

        if (!message || typeof message !== "object") {
          return;
        }

        if (message.type === SET_VIEWER_MESSAGE) {
          void setViewerModel(message.payload);
          return;
        }

        if (message.type === RESOLVE_WORKSPACE_FILE_URL_RESULT_MESSAGE) {
          handleResolvedWorkspaceFileUrl(message.payload);
        }
      });

      app.addEventListener("click", (event) => {
        const target = event.target;

        if (!(target instanceof HTMLElement)) {
          return;
        }

        const action = target.closest("[data-action]");

        if (!(action instanceof HTMLElement)) {
          return;
        }

        const actionName = action.dataset.action;

        if (actionName === "previous-layer") {
          selectLayerByDelta(-1);
          return;
        }

        if (actionName === "next-layer") {
          selectLayerByDelta(1);
          return;
        }

        if (actionName === "mode-single") {
          state.mode = "single";
          render();
          focusViewer();
          return;
        }

        if (actionName === "mode-overlay") {
          state.mode = "overlay";
          render();
          focusViewer();
          return;
        }

        if (actionName === "select-layer") {
          state.activeLayerId = action.dataset.layerId || state.activeLayerId;
          render();
          focusViewer();
          return;
        }

        if (actionName === "reset-transform") {
          const activeLayer = getActiveLayer();

          if (activeLayer) {
            updateLayer(activeLayer.id, {
              offsetX: 0,
              offsetY: 0,
              rotation: 0,
              scale: 1
            });
            focusViewer();
          }
        }
      });

      app.addEventListener("input", (event) => {
        const target = event.target;

        if (!(target instanceof HTMLInputElement)) {
          return;
        }

        const layerId = target.dataset.layerId;
        const field = target.dataset.field;

        if (!layerId || !field) {
          return;
        }

        const value = target.valueAsNumber;

        if (!Number.isFinite(value)) {
          return;
        }

        if (field === "opacity") {
          updateLayer(layerId, {
            opacity: clampNumber(value, 0, 1)
          });
          return;
        }

        const canvas = resolveCanvasSize();

        if (field === "scale") {
          updateLayer(layerId, {
            scale: clampNumber(value, 0.1, 3)
          });
        } else if (field === "offsetX") {
          updateLayer(layerId, {
            offsetX: clampNumber(value, -canvas.width, canvas.width)
          });
        } else if (field === "offsetY") {
          updateLayer(layerId, {
            offsetY: clampNumber(value, -canvas.height, canvas.height)
          });
        } else if (field === "rotation") {
          updateLayer(layerId, {
            rotation: clampNumber(value, -180, 180)
          });
        }
      });

      window.addEventListener("keydown", (event) => {
        if (isEditableKeyboardTarget(event.target)) {
          return;
        }

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          selectLayerByDelta(-1);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          selectLayerByDelta(1);
        } else if (event.key === "Enter" || event.key === " ") {
          const target = event.target;

          if (target instanceof HTMLElement && target.dataset.action === "select-layer") {
            event.preventDefault();
            state.activeLayerId = target.dataset.layerId || state.activeLayerId;
            render();
          }
        }
      });

      app.addEventListener("dragstart", (event) => {
        const target = event.target;

        if (!(target instanceof HTMLElement)) {
          return;
        }

        const layer = target.closest("[data-layer-id]");

        if (!(layer instanceof HTMLElement)) {
          return;
        }

        state.draggedLayerId = layer.dataset.layerId || null;
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", state.draggedLayerId || "");
        render();
      });

      app.addEventListener("dragover", (event) => {
        if (event.target instanceof HTMLElement && event.target.closest("[data-layer-id]")) {
          event.preventDefault();
        }
      });

      app.addEventListener("dragend", () => {
        state.draggedLayerId = null;
        render();
      });

      app.addEventListener("drop", (event) => {
        const target = event.target;

        if (!(target instanceof HTMLElement)) {
          return;
        }

        const layer = target.closest("[data-layer-id]");

        if (!(layer instanceof HTMLElement) || !state.draggedLayerId) {
          return;
        }

        event.preventDefault();
        moveLayerBefore(state.draggedLayerId, layer.dataset.layerId || "");
        state.draggedLayerId = null;
        render();
      });

      function createInitialState() {
        return {
          activeLayerId: null,
          canvas: null,
          draggedLayerId: null,
          error: null,
          fileName: "Image Compare",
          layers: [],
          mode: "single",
          presentation: "full",
          title: null
        };
      }

      async function setViewerModel(model) {
        const file = model && model.file ? model.file : null;
        const fileName = file && typeof file.name === "string" ? file.name : "Image Compare";
        const text = await readViewerText(file);
        const parsed = parseImageCompareManifest(text);

        if (parsed.status === "error") {
          loadRevision += 1;
          state = {
            ...createInitialState(),
            error: parsed.error,
            fileName,
            presentation: readPresentation(model)
          };
          render();
          return;
        }

        loadRevision += 1;
        state = {
          activeLayerId: parsed.manifest.layers[0] ? parsed.manifest.layers[0].id : null,
          canvas: parsed.manifest.canvas,
          draggedLayerId: null,
          error: null,
          fileName,
          layers: parsed.manifest.layers.map((layer) => ({
            ...layer,
            error: null,
            naturalHeight: null,
            naturalWidth: null,
            src: null,
            status: "loading"
          })),
          mode: "single",
          presentation: readPresentation(model),
          title: parsed.manifest.name || fileName
        };
        render();
        focusViewer();
        void loadLayerImages(loadRevision);
      }

      async function readViewerText(file) {
        if (!file || typeof file.data !== "string") {
          return "";
        }

        if (file.dataEncoding !== "data-url") {
          return file.data;
        }

        const response = await fetch(file.data);
        return await response.text();
      }

      async function loadLayerImages(revision) {
        const results = await Promise.all(
          state.layers.map(async (layer) => {
            try {
              const resolved = await resolveLayerSource(layer.path);
              return {
                id: layer.id,
                relativePath: resolved.relativePath,
                src: resolved.url,
                status: "ready"
              };
            } catch (error) {
              return {
                error: toErrorMessage(error),
                id: layer.id,
                status: "error"
              };
            }
          })
        );

        if (revision !== loadRevision) {
          return;
        }

        const resultById = new Map(results.map((result) => [result.id, result]));
        state.layers = state.layers.map((layer) => {
          const result = resultById.get(layer.id);

          if (!result) {
            return layer;
          }

          if (result.status === "ready") {
            return {
              ...layer,
              error: null,
              relativePath: result.relativePath,
              src: result.src,
              status: "ready"
            };
          }

          return {
            ...layer,
            error: result.error,
            src: null,
            status: "error"
          };
        });
        render();
      }

      async function resolveLayerSource(path) {
        if (isDirectImageSource(path)) {
          return {
            relativePath: path,
            url: path
          };
        }

        const response = await requestWorkspaceFileUrl(path);
        return {
          relativePath: response.relativePath || path,
          url: response.url
        };
      }

      function requestWorkspaceFileUrl(path) {
        return new Promise((resolve, reject) => {
          const requestId = createRequestId();
          const timeoutId = window.setTimeout(() => {
            pendingUrlRequests.delete(requestId);
            reject(new Error("workspace file URL の解決が timeout しました。"));
          }, 30000);

          pendingUrlRequests.set(requestId, {
            reject,
            resolve,
            timeoutId
          });

          window.parent.postMessage(
            {
              payload: {
                path,
                requestId
              },
              type: RESOLVE_WORKSPACE_FILE_URL_MESSAGE
            },
            "*"
          );
        });
      }

      function handleResolvedWorkspaceFileUrl(payload) {
        if (!payload || typeof payload.requestId !== "string") {
          return;
        }

        const pending = pendingUrlRequests.get(payload.requestId);

        if (!pending) {
          return;
        }

        window.clearTimeout(pending.timeoutId);
        pendingUrlRequests.delete(payload.requestId);

        if (typeof payload.error === "string" && payload.error.length > 0) {
          pending.reject(new Error(payload.error));
          return;
        }

        if (typeof payload.url !== "string" || payload.url.length === 0) {
          pending.reject(new Error("workspace file URL が返されませんでした。"));
          return;
        }

        pending.resolve({
          relativePath: typeof payload.relativePath === "string" ? payload.relativePath : payload.path,
          url: payload.url
        });
      }

      function render() {
        if (state.error) {
          app.innerHTML = `
            <div class="viewer viewer--empty${state.presentation === "embed" ? " viewer--embed" : ""}" tabindex="0">
              <div class="message">
                <strong>${escapeHtml(state.fileName)}</strong>
                <p>${escapeHtml(state.error)}</p>
              </div>
            </div>
          `;
          return;
        }

        if (state.layers.length === 0) {
          app.innerHTML = `
            <div class="viewer viewer--empty${state.presentation === "embed" ? " viewer--embed" : ""}" tabindex="0">
              <div class="message">
                <strong>${escapeHtml(state.title || state.fileName)}</strong>
                <p>比較対象の画像がありません。</p>
              </div>
            </div>
          `;
          return;
        }

        const activeLayer = getActiveLayer();
        const activeLayerIndex = state.layers.findIndex((layer) => layer.id === (activeLayer && activeLayer.id));
        const visibleLayers = state.mode === "overlay" ? state.layers : activeLayer ? [activeLayer] : [];
        const canvas = resolveCanvasSize();
        const title = state.title || state.fileName;

        app.innerHTML = `
          <div class="viewer${state.presentation === "embed" ? " viewer--embed" : ""}" tabindex="0">
            <div class="main">
              <div class="toolbar">
                <div class="title">
                  <strong title="${escapeAttr(title)}">${escapeHtml(title)}</strong>
                  <span>${activeLayer ? `${activeLayerIndex + 1} / ${state.layers.length}` : state.layers.length}</span>
                </div>
                <div class="actions" role="group">
                  <button class="button" data-action="previous-layer" title="前の画像" type="button">&lt;</button>
                  <button class="button" data-action="next-layer" title="次の画像" type="button">&gt;</button>
                  <div class="segmented" role="group">
                    <button aria-pressed="${state.mode === "single"}" class="segment" data-action="mode-single" type="button">切替</button>
                    <button aria-pressed="${state.mode === "overlay"}" class="segment" data-action="mode-overlay" type="button">重ね</button>
                  </div>
                </div>
              </div>
              <div class="stage-shell">
                <div class="stage" style="aspect-ratio: ${canvas.width} / ${canvas.height}">
                  ${visibleLayers.map((layer) => renderStageImage(layer, canvas)).join("")}
                  ${visibleLayers.some((layer) => layer.status === "loading") ? `<div class="stage-status">画像を読み込み中...</div>` : ""}
                  ${visibleLayers.every((layer) => layer.status === "error") ? `<div class="stage-status stage-status--error">画像を読み込めません。</div>` : ""}
                </div>
              </div>
            </div>
            <aside class="panel">
              <div class="layer-list">
                ${state.layers.map((layer) => renderLayerControl(layer, activeLayer)).join("")}
              </div>
              ${activeLayer ? renderTransformControl(activeLayer, canvas) : ""}
            </aside>
          </div>
        `;

        bindStageImageLoadHandlers();
      }

      function renderStageImage(layer, canvas) {
        if (!layer.src) {
          return "";
        }

        const style = createLayerImageStyle(layer, canvas, getLayerZIndex(layer));
        const isActive = layer.id === (getActiveLayer() && getActiveLayer().id);

        return `
          <img
            alt="${escapeAttr(layer.label)}"
            class="stage-image${isActive ? " is-active" : ""}"
            data-stage-layer-id="${escapeAttr(layer.id)}"
            src="${escapeAttr(layer.src)}"
            style="${escapeAttr(style)}"
          />
        `;
      }

      function renderLayerControl(layer, activeLayer) {
        const activeClass = activeLayer && layer.id === activeLayer.id ? " is-active" : "";
        const draggingClass = state.draggedLayerId === layer.id ? " is-dragging" : "";
        const statusLabel = layer.status === "ready" ? "OK" : layer.status === "loading" ? "..." : "ERR";
        const displayPath = layer.relativePath || layer.path;

        return `
          <div
            class="layer${activeClass}${draggingClass}"
            data-action="select-layer"
            data-layer-id="${escapeAttr(layer.id)}"
            draggable="true"
            role="button"
            tabindex="0"
          >
            <div class="layer-header">
              <span class="drag-handle">::</span>
              <div class="layer-title">
                <strong title="${escapeAttr(layer.label)}">${escapeHtml(layer.label)}</strong>
                <span title="${escapeAttr(displayPath)}">${escapeHtml(displayPath)}</span>
              </div>
              <span class="layer-state is-${escapeAttr(layer.status)}">${statusLabel}</span>
            </div>
            <label class="control">
              <span>透過率</span>
              <input data-field="opacity" data-layer-id="${escapeAttr(layer.id)}" max="1" min="0" step="0.01" type="range" value="${layer.opacity}" />
              <output>${Math.round(layer.opacity * 100)}%</output>
            </label>
            ${layer.error ? `<p class="error">${escapeHtml(layer.error)}</p>` : ""}
          </div>
        `;
      }

      function renderTransformControl(layer, canvas) {
        return `
          <div class="transform">
            <div class="transform-header">
              <strong title="${escapeAttr(layer.label)}">${escapeHtml(layer.label)}</strong>
              <button class="button" data-action="reset-transform" type="button">Reset</button>
            </div>
            ${renderRangeNumber(layer, "scale", "拡大率", 0.1, 3, 0.01, layer.scale)}
            ${renderRangeNumber(layer, "offsetX", "X offset", -canvas.width, canvas.width, 1, layer.offsetX)}
            ${renderRangeNumber(layer, "offsetY", "Y offset", -canvas.height, canvas.height, 1, layer.offsetY)}
            ${renderRangeNumber(layer, "rotation", "回転", -180, 180, 0.5, layer.rotation)}
          </div>
        `;
      }

      function renderRangeNumber(layer, field, label, min, max, step, value) {
        return `
          <label class="control control--transform">
            <span>${escapeHtml(label)}</span>
            <input data-field="${escapeAttr(field)}" data-layer-id="${escapeAttr(layer.id)}" max="${max}" min="${min}" step="${step}" type="range" value="${value}" />
            <input class="number" data-field="${escapeAttr(field)}" data-layer-id="${escapeAttr(layer.id)}" max="${max}" min="${min}" step="${step}" type="number" value="${escapeAttr(formatControlValue(value, step))}" />
          </label>
        `;
      }

      function bindStageImageLoadHandlers() {
        app.querySelectorAll("[data-stage-layer-id]").forEach((element) => {
          if (!(element instanceof HTMLImageElement)) {
            return;
          }

          element.addEventListener("load", () => {
            const naturalWidth = element.naturalWidth;
            const naturalHeight = element.naturalHeight;

            if (naturalWidth <= 0 || naturalHeight <= 0) {
              return;
            }

            updateLayer(element.dataset.stageLayerId || "", {
              naturalHeight,
              naturalWidth
            });
          }, { once: true });

          element.addEventListener("error", () => {
            updateLayer(element.dataset.stageLayerId || "", {
              error: "画像を表示できません。",
              status: "error"
            });
          }, { once: true });
        });
      }

      function parseImageCompareManifest(content) {
        if (!content || content.trim().length === 0) {
          return {
            error: "manifest が空です。",
            status: "error"
          };
        }

        let parsed;

        try {
          parsed = JSON.parse(content);
        } catch (error) {
          return {
            error: `JSON を読み取れません: ${toErrorMessage(error)}`,
            status: "error"
          };
        }

        if (!isRecord(parsed)) {
          return {
            error: "manifest root は object にしてください。",
            status: "error"
          };
        }

        const items = Array.isArray(parsed.images)
          ? parsed.images
          : Array.isArray(parsed.layers)
            ? parsed.layers
            : Array.isArray(parsed.members)
              ? parsed.members
              : null;

        if (!items) {
          return {
            error: "`images` または `layers` 配列が必要です。",
            status: "error"
          };
        }

        const seenIds = new Map();
        const layers = items
          .map((item, index) => parseImageLayer(item, index))
          .filter(Boolean)
          .map((layer) => {
            const usedCount = seenIds.get(layer.id) || 0;
            seenIds.set(layer.id, usedCount + 1);
            return usedCount === 0
              ? layer
              : {
                  ...layer,
                  id: `${layer.id}-${usedCount + 1}`
                };
          });

        if (layers.length === 0) {
          return {
            error: "有効な画像 path を持つ layer がありません。",
            status: "error"
          };
        }

        return {
          manifest: {
            canvas: parseCanvas(parsed),
            layers,
            name: readString(parsed.name) || readString(parsed.title)
          },
          status: "ok"
        };
      }

      function parseImageLayer(item, index) {
        if (typeof item === "string") {
          return createLayerFromPath(item, index, {});
        }

        if (!isRecord(item)) {
          return null;
        }

        const rawPath =
          readString(item.path) ||
          readString(item.relativePath) ||
          readString(item.src) ||
          readString(item.file);

        if (!rawPath) {
          return null;
        }

        const offset = isRecord(item.offset) ? item.offset : {};
        const label =
          readString(item.label) ||
          readString(item.name) ||
          readString(item.displayName) ||
          basename(rawPath);

        return createLayerFromPath(rawPath, index, {
          id: readString(item.id) || label,
          label,
          offsetX: readNumber(item.offsetX) ?? readNumber(item.x) ?? readNumber(offset.x) ?? 0,
          offsetY: readNumber(item.offsetY) ?? readNumber(item.y) ?? readNumber(offset.y) ?? 0,
          opacity: normalizeOpacity(readNumber(item.opacity)),
          rotation: readNumber(item.rotation) ?? readNumber(item.rotate) ?? readNumber(item.rotationDeg) ?? 0,
          scale: clampNumber(readNumber(item.scale) ?? readNumber(item.size) ?? 1, 0.1, 3)
        });
      }

      function createLayerFromPath(path, index, patch) {
        const label = patch.label || basename(path);

        return {
          id: createLayerId(patch.id || label, index),
          label,
          offsetX: patch.offsetX ?? 0,
          offsetY: patch.offsetY ?? 0,
          opacity: patch.opacity ?? 1,
          path,
          relativePath: path,
          rotation: patch.rotation ?? 0,
          scale: patch.scale ?? 1
        };
      }

      function parseCanvas(manifest) {
        const canvas = isRecord(manifest.canvas) ? manifest.canvas : {};
        const width = readNumber(manifest.width) ?? readNumber(manifest.canvasWidth) ?? readNumber(canvas.width);
        const height = readNumber(manifest.height) ?? readNumber(manifest.canvasHeight) ?? readNumber(canvas.height);

        if (!width || !height || width <= 0 || height <= 0) {
          return null;
        }

        return { height, width };
      }

      function resolveCanvasSize() {
        if (state.canvas) {
          return state.canvas;
        }

        const activeLayer = getActiveLayer();
        const measuredLayer =
          state.layers.find((layer) => layer.naturalWidth && layer.naturalHeight) ||
          (activeLayer && activeLayer.naturalWidth && activeLayer.naturalHeight ? activeLayer : null);

        if (measuredLayer) {
          return {
            height: measuredLayer.naturalHeight,
            width: measuredLayer.naturalWidth
          };
        }

        return {
          height: 768,
          width: 1024
        };
      }

      function createLayerImageStyle(layer, canvas, zIndex) {
        const naturalWidth = layer.naturalWidth || canvas.width;
        const naturalHeight = layer.naturalHeight || canvas.height;
        const widthPercent = (naturalWidth / canvas.width) * 100;
        const heightPercent = (naturalHeight / canvas.height) * 100;
        const leftPercent = 50 + (layer.offsetX / canvas.width) * 100;
        const topPercent = 50 + (layer.offsetY / canvas.height) * 100;

        return [
          `height: ${heightPercent}%`,
          `left: ${leftPercent}%`,
          `opacity: ${layer.opacity}`,
          `top: ${topPercent}%`,
          `transform: translate(-50%, -50%) scale(${layer.scale}) rotate(${layer.rotation}deg)`,
          `width: ${widthPercent}%`,
          `z-index: ${zIndex}`
        ].join("; ");
      }

      function getLayerZIndex(layer) {
        const index = state.layers.findIndex((candidate) => candidate.id === layer.id);
        return index < 0 ? 1 : state.layers.length - index;
      }

      function getActiveLayer() {
        return (
          state.layers.find((layer) => layer.id === state.activeLayerId) ||
          state.layers[0] ||
          null
        );
      }

      function selectLayerByDelta(delta) {
        if (state.layers.length === 0) {
          return;
        }

        const activeLayer = getActiveLayer();
        const currentIndex = Math.max(
          0,
          state.layers.findIndex((layer) => activeLayer && layer.id === activeLayer.id)
        );
        const nextIndex = (currentIndex + delta + state.layers.length) % state.layers.length;
        state.activeLayerId = state.layers[nextIndex].id;
        render();
        focusViewer();
      }

      function updateLayer(layerId, patch) {
        if (!layerId) {
          return;
        }

        let didChange = false;
        state.layers = state.layers.map((layer) => {
          if (layer.id !== layerId) {
            return layer;
          }

          const patchEntries = Object.entries(patch);

          if (patchEntries.every(([key, value]) => layer[key] === value)) {
            return layer;
          }

          didChange = true;
          return {
            ...layer,
            ...patch
          };
        });

        if (didChange) {
          render();
        }
      }

      function moveLayerBefore(draggedLayerId, targetLayerId) {
        if (!draggedLayerId || !targetLayerId || draggedLayerId === targetLayerId) {
          return;
        }

        const fromIndex = state.layers.findIndex((layer) => layer.id === draggedLayerId);
        const toIndex = state.layers.findIndex((layer) => layer.id === targetLayerId);

        if (fromIndex < 0 || toIndex < 0) {
          return;
        }

        const nextLayers = [...state.layers];
        const draggedLayer = nextLayers.splice(fromIndex, 1)[0];
        nextLayers.splice(toIndex, 0, draggedLayer);
        state.layers = nextLayers;
      }

      function isDirectImageSource(value) {
        const trimmed = value.trim().toLowerCase();
        return (
          trimmed.startsWith("data:") ||
          trimmed.startsWith("blob:") ||
          trimmed.startsWith("http://") ||
          trimmed.startsWith("https://")
        );
      }

      function focusViewer() {
        const viewer = app.querySelector(".viewer");

        if (viewer instanceof HTMLElement) {
          viewer.focus({ preventScroll: true });
        }
      }

      function readPresentation(model) {
        return model && model.presentation === "embed" ? "embed" : "full";
      }

      function createLayerId(value, index) {
        const normalized = value.trim().replace(/[^A-Za-z0-9._-]+/g, "-").replace(/^-+|-+$/g, "");
        return normalized.length > 0 ? normalized : `image-${index + 1}`;
      }

      function createRequestId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }

        return `request-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      }

      function basename(relativePath) {
        const parts = relativePath.replace(/\\/g, "/").split("/").filter(Boolean);
        return parts[parts.length - 1] || relativePath;
      }

      function normalizeOpacity(value) {
        if (value === null || value === undefined) {
          return 1;
        }

        if (value > 1 && value <= 100) {
          return clampNumber(value / 100, 0, 1);
        }

        return clampNumber(value, 0, 1);
      }

      function formatControlValue(value, step) {
        if (step >= 1) {
          return Math.round(value).toString();
        }

        return Number(value.toFixed(2)).toString();
      }

      function clampNumber(value, min, max) {
        if (!Number.isFinite(value)) {
          return min;
        }

        return Math.min(max, Math.max(min, value));
      }

      function isEditableKeyboardTarget(target) {
        return (
          target instanceof HTMLElement &&
          (target.isContentEditable ||
            target.tagName === "INPUT" ||
            target.tagName === "TEXTAREA" ||
            target.tagName === "SELECT")
        );
      }

      function readNumber(value) {
        return typeof value === "number" && Number.isFinite(value) ? value : null;
      }

      function readString(value) {
        if (typeof value !== "string") {
          return null;
        }

        const trimmed = value.trim();
        return trimmed.length > 0 ? trimmed : null;
      }

      function isRecord(value) {
        return typeof value === "object" && value !== null && !Array.isArray(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      function toErrorMessage(error) {
        return error instanceof Error ? error.message : String(error);
      }
    </script>
  </body>
</html>
