<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standard Graphs Renderer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
        background: #f5f8fb;
        color: #16324a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #f8fbff, #eef4f9);
      }

      body {
        padding: 14px;
      }

      .card {
        display: grid;
        gap: 12px;
        min-height: 100%;
        padding: 14px;
        border: 1px solid #d4e0ea;
        border-radius: 14px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(243, 247, 251, 0.98)),
          #ffffff;
      }

      .header,
      .stats,
      .chips {
        display: flex;
      }

      .header {
        align-items: center;
        justify-content: space-between;
      }

      .stats,
      .chips {
        gap: 8px;
        flex-wrap: wrap;
      }

      .stat {
        min-width: 92px;
        padding: 8px 10px;
        border: 1px solid #d6e2ee;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.86);
      }

      .label {
        display: block;
        margin-bottom: 4px;
        color: #6c8094;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .value {
        font-size: 14px;
        font-weight: 700;
      }

      .plot {
        padding: 10px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(228, 236, 245, 0.74), rgba(248, 251, 254, 0.96));
      }

      svg {
        display: block;
        width: 100%;
        height: 126px;
      }

      .axis {
        stroke: #8da3b7;
        stroke-width: 1.4;
        fill: none;
      }

      .trace {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 3;
      }

      .trace-0 {
        stroke: #0f6cbd;
      }

      .trace-1 {
        stroke: #1b8f5a;
      }

      .trace-2 {
        stroke: #d97706;
      }

      .trace-3 {
        stroke: #9f3a8c;
      }

      .chip,
      .empty {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }

      .chip {
        border: 1px solid #d2dfeb;
        background: #ffffff;
        color: #234968;
      }

      .empty {
        color: #698093;
        background: rgba(223, 232, 240, 0.9);
      }
    </style>
  </head>
  <body>
    <div class="card" id="root">
      <div class="empty">Standard Graphs renderer is ready.</div>
    </div>
    <script>
      const root = document.getElementById("root");
      const TRACE_PATHS = [
        "M8 86 C22 86 26 86 30 74 S42 22 48 22 S58 84 66 84 S78 36 86 36 S98 78 110 78 S122 44 132 44 S146 74 156 74 S170 24 182 24 S198 84 232 84",
        "M8 84 C22 84 26 84 32 58 S46 18 54 18 S66 80 74 80 S88 42 98 42 S112 70 124 70 S140 28 152 28 S170 64 184 64 S202 36 232 36",
        "M8 82 C22 82 26 82 34 66 S48 34 56 34 S68 74 78 74 S92 52 102 52 S118 80 128 80 S146 48 160 48 S178 70 194 70 S212 26 232 26",
        "M8 88 C22 88 26 88 34 72 S48 48 58 48 S72 86 84 86 S98 24 108 24 S122 68 136 68 S154 18 166 18 S186 74 198 74 S214 54 232 54"
      ];

      window.addEventListener("message", (event) => {
        if (!event.data || event.data.type !== "integral:set-block") {
          return;
        }

        render(event.data.payload);
      });

      function render(payload) {
        const block = payload?.block ?? {};
        const params = isRecord(block.params) ? block.params : {};
        const files = Array.isArray(params.data)
          ? params.data.filter((item) => typeof item === "string" && item.trim().length > 0)
          : [];
        const traceCount = Math.max(1, Math.min(files.length || 1, TRACE_PATHS.length));
        const tracePaths = TRACE_PATHS.slice(0, traceCount);

        root.innerHTML = `
          <div class="header">
            <div>
              <div class="label">Plugin</div>
              <div class="value">Standard Graphs</div>
            </div>
            <div class="label">${escapeHtml(block.type ?? "unknown")}</div>
          </div>
          <div class="stats">
            <div class="stat">
              <span class="label">Series</span>
              <strong class="value">${files.length}</strong>
            </div>
            <div class="stat">
              <span class="label">View</span>
              <strong class="value">Overlay</strong>
            </div>
            <div class="stat">
              <span class="label">Status</span>
              <strong class="value">${files.length > 0 ? "Ready" : "Need data"}</strong>
            </div>
          </div>
          <div class="plot">
            <svg viewBox="0 0 240 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path class="axis" d="M10 8 V88 H232"></path>
              ${tracePaths
                .map(
                  (path, index) =>
                    `<path class="trace trace-${index}" d="${path}" pathLength="100"></path>`
                )
                .join("")}
            </svg>
          </div>
          <div class="chips">
            ${
              files.length > 0
                ? files.map((file) => `<span class="chip">${escapeHtml(file)}</span>`).join("")
                : '<span class="empty">データファイル未設定</span>'
            }
          </div>
        `;
      }

      function isRecord(value) {
        return typeof value === "object" && value !== null && !Array.isArray(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
